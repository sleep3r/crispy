name: "Release"

on: workflow_dispatch

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14" # for Arm based macs (M1 and above). Uses macOS 14 (Sonoma) for better compatibility.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            sign: true  # Apple Developer certificate configured
          # AppImage + .deb + RPM for x86_64 Linux on 24.04. The prebuilt onnxruntime
          # pulled by ort rc.12 (transcribe-rs 0.3) needs glibc >= 2.38, so ubuntu-22.04
          # (glibc 2.35) can no longer link it. Linux floor is now glibc 2.38 (Ubuntu 24.04+).
          - platform: "ubuntu-24.04"
            args: "--bundles appimage,deb,rpm"
            target: "x86_64-unknown-linux-gnu"
            sign: false
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
            sign: false
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
            sign: false  # No Windows signing certificate yet
          # windows-11-arm (aarch64) dropped: whisper.cpp/ggml refuses MSVC on ARM
          # ("use clang"); needs a clang-cl toolchain. Revisit separately.

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: ${{ matrix.sign }}
      asset-prefix: "crispy"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit
